<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Crawler</title>

<style>
body{
background:#121212;
color:#fff;
font-family:monospace;
text-align:center;
margin:0;
}

#scene{
position:relative;
margin:20px auto;
width:800px;
height:300px;
background:url("room.png") center/cover no-repeat, #222;
border-radius:10px;
overflow:hidden;
}

#playerSprite{
position:absolute;
left:50px;
bottom:20px;
width:120px;
}

#enemySprite{
position:absolute;
right:50px;
bottom:20px;
width:120px;
}

.hpBar{
position:absolute;
top:10px;
width:200px;
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
}

#playerBar{left:10px;}
#enemyBar{right:10px;}

.hpFill{
height:100%;
background:lime;
}

.hpBar span{
position:absolute;
width:100%;
text-align:left;
padding-left:8px; /* ✅ shift right */
font-size:12px;
top:0;
}

.damage{
position:absolute;
font-weight:bold;
animation:floatUp 1s forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-40px);}
}

.critFlash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.4);
animation:flash 0.2s;
pointer-events:none;
}

@keyframes flash{
0%{opacity:1;}
100%{opacity:0;}
}

button{
padding:10px;
margin:5px;
width:150px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

#log{
height:200px;
background:#000;
overflow-y:auto;
text-align:left;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>
HP: <span id="hp">100</span> |
ATK: <span id="atk">10</span> |
DEF: <span id="def">5</span> |
Room: <span id="roomText">0/8</span> |
CRIT: <span id="crit">10%</span>
</h2>

<div id="scene">
<div id="playerBar" class="hpBar">
<div id="playerHP" class="hpFill"></div>
<span id="playerHPText"></span>
</div>

<div id="enemyBar" class="hpBar">
<div id="enemyHP" class="hpFill"></div>
<span id="enemyHPText"></span>
</div>

<img id="playerSprite" src="player.png">
<img id="enemySprite">
</div>

<div id="actions"></div>
<div id="log"></div>

<script>
const scene=document.getElementById("scene");
const logDiv=document.getElementById("log");
const actions=document.getElementById("actions");

const hpEl=document.getElementById("hp");
const atkEl=document.getElementById("atk");
const defEl=document.getElementById("def");
const roomEl=document.getElementById("roomText");
const critEl=document.getElementById("crit");

const playerHPBar=document.getElementById("playerHP");
const enemyHPBar=document.getElementById("enemyHP");

const playerHPText=document.getElementById("playerHPText");
const enemyHPText=document.getElementById("enemyHPText");

const enemySprite=document.getElementById("enemySprite");

const game={
player:{hp:100,atk:10,def:5,crit:0.1},
enemy:null,
room:0,
maxRooms:8,
state:"CREATION",
isBoss:false
};

function log(msg){
const d=document.createElement("div");
d.innerHTML=msg;
logDiv.appendChild(d);
logDiv.scrollTop=logDiv.scrollHeight;
}

function showDamage(x,y,text,color){
const d=document.createElement("div");
d.className="damage";
d.style.left=x+"px";
d.style.top=y+"px";
d.style.color=color;
d.innerText=text;
scene.appendChild(d);
setTimeout(()=>d.remove(),1000);
}

function flash(){
const f=document.createElement("div");
f.className="critFlash";
scene.appendChild(f);
setTimeout(()=>f.remove(),200);
}

function updateUI(){
game.player.hp=Math.min(game.player.hp,100);

hpEl.innerText=Math.max(0,game.player.hp);
atkEl.innerText=game.player.atk;
defEl.innerText=game.player.def;
roomEl.innerText=game.room + "/" + game.maxRooms;
critEl.innerText=Math.floor(game.player.crit*100)+"%";

playerHPBar.style.width=(game.player.hp/100*100)+"%";
playerHPText.innerText=game.player.hp+"/100";

if(game.enemy){
let max=game.isBoss?100:40;
enemyHPBar.style.width=(game.enemy.hp/max*100)+"%";
enemyHPText.innerText=game.enemy.hp+"/"+max;
}else{
enemyHPBar.style.width="0%";
enemyHPText.innerText="";
}
}

function clear(){actions.innerHTML="";}

function btn(text,fn){
const b=document.createElement("button");
b.innerText=text;
b.onclick=fn;
actions.appendChild(b);
}

function render(){
clear();

if(game.state==="CREATION"){
log("Choose your trait:");
btn("Strong",()=>{game.player.atk+=5;game.state="PATH";render();});
btn("Tough",()=>{game.player.hp+=20;game.state="PATH";render();});
btn("Defensive",()=>{game.player.def+=5;game.state="PATH";render();});
}

else if(game.state==="PATH"){
btn("⬅ Left",enterRoom);
btn("⬆ Forward",enterRoom);
btn("➡ Right",enterRoom);
}

else if(game.state==="COMBAT"){
btn("Punch",()=>combatTurn("Punch"));
btn("Counter",()=>combatTurn("Counter"));
btn("Quick Attack",()=>combatTurn("Quick Attack"));
}

else if(game.state==="GAMEOVER"){
log("💀 GAME OVER - Click below to restart");
btn("🔄 Restart Run",reset);
}

else if(game.state==="WIN"){
log("🏆 YOU WON - Play again?");
btn("🔄 Play Again",reset);
}
}

function enterRoom(){
game.room++; // ✅ ALWAYS increase

if(game.room === game.maxRooms){
startCombat(true);
updateUI();
return;
}

const r=Math.floor(Math.random()*6)+1;

if(r<=3){
log("[Room "+game.room+"] Enemy!");
startCombat(false);
}
else if(r===4){
log("[Room "+game.room+"] Empty.");
}
else if(r===5){
log("[Room "+game.room+"] Potion +15 HP");
game.player.hp+=15;
}
else{
loot();
}

updateUI();
render();
}

function startCombat(isBoss){
game.isBoss=isBoss;

game.enemy=isBoss?
{hp:100,atk:25,def:5}:
{hp:40,atk:10,def:3};

enemySprite.src=isBoss?"boss.png":"enemy.png";

game.state="COMBAT";
log(isBoss?"🔥 BOSS FIGHT 🔥":"Battle starts!");
updateUI();
render();
}

function combatTurn(playerMove){
if(game.state!=="COMBAT"||!game.enemy) return;

const moves=["Punch","Counter","Quick Attack"];
const enemyMove=moves[Math.floor(Math.random()*3)];

log(`You: ${playerMove} | Enemy: ${enemyMove}`);

let pMod=0.5,eMod=0.5;

if(
(playerMove==="Punch"&&enemyMove==="Counter")||
(playerMove==="Counter"&&enemyMove==="Quick Attack")||
(playerMove==="Quick Attack"&&enemyMove==="Punch")
){pMod=1;eMod=0.25;}

else if(
(enemyMove==="Punch"&&playerMove==="Counter")||
(enemyMove==="Counter"&&playerMove==="Quick Attack")||
(enemyMove==="Quick Attack"&&playerMove==="Punch")
){pMod=0.5;eMod=1;}

let dmgP=Math.floor((game.player.atk-game.enemy.def+rand(-2,2))*pMod);
let critHit=Math.random()<game.player.crit;

if(critHit){
dmgP*=2;
flash();
}

dmgP=Math.max(1,dmgP);
game.enemy.hp-=dmgP;

showDamage(600,150,(critHit?"CRIT ":"")+dmgP,critHit?"yellow":"red");
log(`You deal ${dmgP}`);

if(game.enemy.hp<=0){
log("Enemy defeated!");
enemySprite.src="";
game.enemy=null;

if(game.isBoss){
game.state="WIN";
log("🏆 YOU WIN!");
}else{
game.state="PATH";
}

updateUI();
render();
return;
}

let dmgE=Math.floor((game.enemy.atk-game.player.def+rand(-2,2))*eMod);
dmgE=Math.max(0,dmgE);

game.player.hp-=dmgE;

showDamage(150,150,dmgE,"white");
log(`Enemy deals ${dmgE}`);

if(game.player.hp<=0){
game.state="GAMEOVER";
log("GAME OVER");
}

updateUI();
}

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

function loot(){
const items=["Sword","Shield","Elixir","Dagger"];
const item=items[Math.floor(Math.random()*items.length)];

log("[Loot] "+item);

if(item==="Sword") game.player.atk+=3;
if(item==="Shield") game.player.def+=2;
if(item==="Elixir") game.player.hp+=25;
if(item==="Dagger") game.player.crit+=0.1;
}

function reset(){
game.player={hp:100,atk:10,def:5,crit:0.1};
game.room=0;
game.state="CREATION";
game.enemy=null;
logDiv.innerHTML="";
enemySprite.src="";
updateUI();
render();
}

updateUI();
render();
</script>

</body>
</html>
