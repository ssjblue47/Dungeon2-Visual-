<!DOCTYPE html>
<html>
<head>
<title>Dungeon Crawler</title>

<style>
body{
background:#111;
color:white;
font-family:monospace;
text-align:center;
}

#scene{
position:relative;
width:800px;
height:300px;
margin:20px auto;
background:url("room.png") center/cover;
border-radius:10px;
overflow:hidden;
}

img{
position:absolute;
bottom:20px;
height:180px;
}

#playerImg{ left:50px; }
#enemyImg{ right:50px; }

.hpBar{
position:absolute;
top:10px;
width:200px;
height:15px;
background:#333;
border-radius:10px;
}

#playerBar{ left:10px; }
#enemyBar{ right:10px; }

#playerHP,#enemyHP{
height:100%;
background:lime;
border-radius:10px;
}

#log{
height:150px;
overflow:auto;
background:black;
text-align:left;
padding:10px;
margin:10px auto;
width:800px;
}

button{
margin:5px;
padding:10px;
width:150px;
}

/* DAMAGE */
.dmg{
position:absolute;
font-weight:bold;
font-size:18px;
animation:floatUp 0.8s forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-40px);}
}

/* CRIT FLASH */
.flash{
animation:flash 0.2s;
}

@keyframes flash{
0%{filter:brightness(2);}
100%{filter:brightness(1);}
}
</style>
</head>

<body>

<h1>Dungeon Crawler</h1>
<div id="stats"></div>

<div id="scene">
<img id="playerImg" src="player.png">
<img id="enemyImg">

<div id="playerBar" class="hpBar"><div id="playerHP"></div></div>
<div id="enemyBar" class="hpBar"><div id="enemyHP"></div></div>
</div>

<div id="log"></div>

<!-- ACTION BUTTONS -->
<div>
<button onclick="attack()">Punch</button>
<button onclick="quick()">Quick</button>
<button onclick="counter()">Counter</button>
<button id="chestBtn" onclick="openChest()" style="display:none;">Open Chest</button>
</div>

<!-- DOORS -->
<div>
<button onclick="chooseDoor()">Left</button>
<button onclick="chooseDoor()">Forward</button>
<button onclick="chooseDoor()">Right</button>
</div>

<script>
let player, enemy, room, roomActive;

function resetGame(){
player = {
hp:100,
maxHp:100,
atk:10,
def:5,
crit:0.1,
dodge:0.1,
combo:0
};

enemy=null;
room=0;
roomActive=false;

log("Choose a door...");
updateStats();
updateHP();
}

function log(t){
document.getElementById("log").innerHTML += t+"<br>";
}

function updateStats(){
document.getElementById("stats").innerText =
`HP:${player.hp}/${player.maxHp} ATK:${player.atk} DEF:${player.def} CRIT:${Math.round(player.crit*100)}% Room:${room}/8`;
}

function updateHP(){
document.getElementById("playerHP").style.width =
(player.hp/player.maxHp*100)+"%";

if(enemy){
document.getElementById("enemyHP").style.width =
(enemy.hp/enemy.maxHp*100)+"%";
}else{
document.getElementById("enemyHP").style.width="0%";
}
}

function showDamage(target,text,color){
const rect = target.getBoundingClientRect();
const sceneRect = scene.getBoundingClientRect();

const d=document.createElement("div");
d.className="dmg";
d.style.left=(rect.left-sceneRect.left+50)+"px";
d.style.top=(rect.top-sceneRect.top)+"px";
d.style.color=color;
d.innerText=text;

scene.appendChild(d);
setTimeout(()=>d.remove(),800);
}

function spawnEnemy(type){
if(type==="boss"){
enemyImg.src="boss.png";
enemy={hp:150,maxHp:150,atk:15,def:6,dodge:0.005};
}else{
enemyImg.src="enemy.png";
enemy={hp:60,maxHp:60,atk:8,def:3,dodge:0.05};
}
}

function chooseDoor(){
if(roomActive){
log("Finish the room first!");
return;
}

if(room>=8){
log("Dungeon complete!");
return;
}

room++;
roomActive=true;

let roll=Math.random();

if(room===8){
spawnEnemy("boss");
log("Boss room!");
}
else if(roll<0.6){
spawnEnemy("normal");
log("Enemy!");
}
else if(roll<0.85){
enemy=null;
enemyImg.src="chest.png";
document.getElementById("chestBtn").style.display="inline";
log("Chest!");
}
else{
enemy=null;
enemyImg.src="";
log("Empty room.");
roomActive=false;
}

updateStats();
updateHP();
}

function openChest(){
document.getElementById("chestBtn").style.display="none";

let r=Math.random();

if(r<0.33){
player.atk+=5;
log("Sword +ATK");
}
else if(r<0.66){
player.crit+=0.1;
log("Dagger +CRIT");
}
else{
player.hp=Math.min(player.maxHp, player.hp+20);
showDamage(playerImg,"+20","lime");
log("Potion");
}

enemyImg.src="";
roomActive=false;
updateStats();
}

function calcHit(attacker,defender){
if(Math.random()<defender.dodge){
return {miss:true};
}

let dmg=attacker.atk-defender.def;
if(dmg<1)dmg=1;

let crit=false;

if(attacker===player && Math.random()<player.crit){
dmg*=2;
crit=true;
enemyImg.classList.add("flash");
setTimeout(()=>enemyImg.classList.remove("flash"),200);
}

return {dmg,crit};
}

function attack(){
if(!enemy){
log("No enemy!");
return;
}

let p=calcHit(player,enemy);

if(p.miss){
showDamage(enemyImg,"MISS","gray");
}else{
enemy.hp-=p.dmg;
showDamage(enemyImg,"-"+p.dmg,p.crit?"yellow":"red");
}

let e=calcHit(enemy,player);

if(e.miss){
showDamage(playerImg,"MISS","gray");
}else{
player.hp-=e.dmg;
showDamage(playerImg,"-"+e.dmg,"red");
}

checkFight();
}

function quick(){
player.atk+=3;
attack();
player.atk-=3;
}

function counter(){
player.def+=5;
attack();
player.def-=5;
}

function checkFight(){
if(enemy && enemy.hp<=0){
log("Win!");
player.combo++;

if(player.combo>=2){
let bonus=Math.floor(player.atk*1.5);
showDamage(enemyImg,"-"+bonus,"orange");
log("Combo strike!");
player.combo=0;
}

enemy=null;
enemyImg.src="";
roomActive=false;
}
else if(player.hp<=0){
log("You died!");
resetGame();
}

updateStats();
updateHP();
}

resetGame();
</script>

</body>
</html>
