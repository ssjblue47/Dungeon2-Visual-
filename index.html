<!DOCTYPE html>
<html>
<head>
<title>Dungeon Crawler</title>

<style>
body{
background:#111;
color:white;
font-family:monospace;
text-align:center;
}

#scene{
position:relative;
width:800px;
height:300px;
margin:auto;
background:url("room.png") center/cover;
border-radius:10px;
overflow:hidden;
}

img{
position:absolute;
bottom:20px;
height:180px;
}

#playerImg{ left:50px; }
#enemyImg{ right:50px; }

.hpBar{
position:absolute;
top:10px;
width:200px;
height:15px;
background:#333;
border-radius:10px;
}

#playerBar{ left:10px; }
#enemyBar{ right:10px; }

#playerHP,#enemyHP{
height:100%;
background:lime;
border-radius:10px;
}

button{
margin:5px;
padding:10px;
width:200px;
}

#log{
height:200px;
overflow:auto;
background:black;
text-align:left;
padding:10px;
}

/* DAMAGE TEXT */
.dmg{
position:absolute;
font-weight:bold;
font-size:18px;
text-shadow:0 0 5px black;
animation:floatUp 0.8s forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-40px);}
}

/* CRIT FLASH */
.flash{
animation:flash 0.2s;
}

@keyframes flash{
0%{filter:brightness(2);}
100%{filter:brightness(1);}
}
</style>
</head>

<body>

<h1>Dungeon Crawler</h1>
<div id="stats"></div>

<div id="scene">
<img id="playerImg" src="player.png">
<img id="enemyImg">

<div id="playerBar" class="hpBar"><div id="playerHP"></div></div>
<div id="enemyBar" class="hpBar"><div id="enemyHP"></div></div>
</div>

<div id="log"></div>

<div id="buttons">
<button onclick="attack()">Punch</button>
<button onclick="quick()">Quick Attack</button>
<button onclick="counter()">Counter</button>
<button id="chestBtn" onclick="openChest()" style="display:none;">Open Chest</button>
<button onclick="nextRoom()">Next Room</button>
</div>

<script>
let player, enemy, room;

function resetGame(){
player = {
hp:100,
atk:10,
def:5,
crit:0.1,
dodge:0.1,
combo:0
};

enemy=null;
room=0;

document.getElementById("enemyImg").src="";
nextRoom();
}

function log(t){
document.getElementById("log").innerHTML += t+"<br>";
}

function updateStats(){
document.getElementById("stats").innerText =
`HP:${player.hp} ATK:${player.atk} DEF:${player.def} CRIT:${Math.round(player.crit*100)}% Room:${room}/8`;
}

function updateHP(){
document.getElementById("playerHP").style.width = player.hp+"%";
if(enemy)
document.getElementById("enemyHP").style.width = enemy.hp+"%";
}

function showDamage(target,text,color="red"){
const rect = target.getBoundingClientRect();
const sceneRect = scene.getBoundingClientRect();

const d=document.createElement("div");
d.className="dmg";
d.style.left=(rect.left-sceneRect.left+50)+"px";
d.style.top=(rect.top-sceneRect.top)+"px";
d.style.color=color;
d.innerText=text;

scene.appendChild(d);
setTimeout(()=>d.remove(),800);
}

function spawnEnemy(type){
const img=document.getElementById("enemyImg");

if(type==="boss"){
img.src="boss.png";
scene.style.background="url(bossroom.png) center/cover";
enemy={hp:150,atk:15,def:6,dodge:0.005,type:"boss"};
}else{
img.src="enemy.png";
scene.style.background="url(combat.png) center/cover";
enemy={hp:60,atk:8,def:3,dodge:0.05,type:"normal"};
}
}

function nextRoom(){
room++;
document.getElementById("chestBtn").style.display="none";

if(room===8){
spawnEnemy("boss");
log("Boss appears!");
}
else{
let roll=Math.random();

if(roll<0.5){
spawnEnemy("normal");
log("Enemy!");
}
else if(roll<0.8){
enemy=null;
document.getElementById("enemyImg").src="chest.png";
scene.style.background="url(room.png) center/cover";
document.getElementById("chestBtn").style.display="inline";
log("Chest found!");
}
else{
enemy=null;
document.getElementById("enemyImg").src="";
scene.style.background="url(room.png) center/cover";
log("Empty room.");
}
}

updateStats();
updateHP();
}

function openChest(){
document.getElementById("chestBtn").style.display="none";

let r=Math.random();

if(r<0.33){
player.atk+=5;
log("Found sword! +ATK");
}
else if(r<0.66){
player.crit+=0.1;
log("Found dagger! +CRIT");
}
else{
player.hp+=20;
showDamage(playerImg,"+20","lime");
log("Potion!");
}

document.getElementById("enemyImg").src="";
updateStats();
}

function calcHit(attacker,defender){
if(Math.random()<defender.dodge){
return {miss:true};
}

let dmg = attacker.atk - defender.def;
if(dmg<1) dmg=1;

let crit=false;

if(attacker===player && Math.random()<player.crit){
dmg*=2;
crit=true;
enemyImg.classList.add("flash");
setTimeout(()=>enemyImg.classList.remove("flash"),200);
}

return {dmg,crit};
}

function attack(){
if(!enemy) return;

let p = calcHit(player,enemy);

if(p.miss){
showDamage(enemyImg,"MISS","gray");
}else{
enemy.hp-=p.dmg;
showDamage(enemyImg,"-"+p.dmg, p.crit?"yellow":"red");
}

let e = calcHit(enemy,player);

if(e.miss){
showDamage(playerImg,"MISS","gray");
}else{
player.hp-=e.dmg;
showDamage(playerImg,"-"+e.dmg,"red");
}

checkFight();
}

function quick(){
player.atk+=3;
attack();
player.atk-=3;
}

function counter(){
player.def+=5;
attack();
player.def-=5;
}

function checkFight(){
if(enemy && enemy.hp<=0){
log("Win!");
player.combo++;

if(player.combo>=2){
log("COMBO STRIKE!");
enemy=null;
let bonus = Math.floor(player.atk*1.5);
showDamage(enemyImg,"-"+bonus,"orange");
player.combo=0;
}

enemy=null;
document.getElementById("enemyImg").src="";
}
else if(player.hp<=0){
log("You died. Restarting...");
resetGame();
}

updateStats();
updateHP();
}

resetGame();
</script>

</body>
</html>
