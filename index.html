<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dungeon Crawler</title>

<style>
body{
background:#121212;
color:#fff;
font-family:monospace;
text-align:center;
margin:0;
}

#game{
width:900px;
margin:auto;
}

#scene{
position:relative;
margin:20px auto;
width:800px;
height:300px;
background:url("doors.png") center/cover no-repeat;
border-radius:10px;
overflow:hidden;
}

#playerSprite{
position:absolute;
left:50px;
bottom:20px;
width:120px;
}

#enemySprite{
position:absolute;
right:50px;
bottom:20px;
width:120px;
}

#log{
height:200px;
background:#000;
overflow-y:auto;
text-align:left;
padding:10px;
margin-top:10px;
}

button{
padding:10px;
margin:5px;
width:150px;
background:#333;
color:white;
border:none;
cursor:pointer;
}

.hpBar{
position:absolute;
top:10px;
width:200px;
height:15px;
background:#444;
border-radius:10px;
overflow:hidden;
}

#playerBar{left:10px;}
#enemyBar{right:10px;}

.hpFill{
height:100%;
background:lime;
}
</style>
</head>

<body>

<div id="game">
<h1>Dungeon Crawler</h1>

<div>
HP: <span id="hp">100</span> |
ATK: <span id="atk">10</span> |
DEF: <span id="def">5</span> |
Room: <span id="room">0/8</span>
</div>

<div id="scene">
<div id="playerBar" class="hpBar"><div id="playerHP" class="hpFill"></div></div>
<div id="enemyBar" class="hpBar"><div id="enemyHP" class="hpFill"></div></div>

<img id="playerSprite" src="player.png">
<img id="enemySprite">
</div>

<div id="log"></div>
<div id="actions"></div>

</div>

<script>
const game={
player:{hp:100,atk:10,def:5},
enemy:null,
room:0,
maxRooms:8,
state:"CREATION",
isBoss:false
};

const logDiv=document.getElementById("log");
const actions=document.getElementById("actions");

function log(msg){
const d=document.createElement("div");
d.innerHTML=msg;
logDiv.appendChild(d);
logDiv.scrollTop=logDiv.scrollHeight;
}

function updateUI(){
hp.innerText=Math.max(0,game.player.hp);
atk.innerText=game.player.atk;
def.innerText=game.player.def;
room.innerText=`${game.room}/${game.maxRooms}`;

document.getElementById("playerHP").style.width=(game.player.hp)+"%";

if(game.enemy){
document.getElementById("enemyHP").style.width=(game.enemy.hp)+"%";
}else{
document.getElementById("enemyHP").style.width="0%";
}
}

function clear(){actions.innerHTML="";}

function btn(text,fn){
const b=document.createElement("button");
b.innerText=text;
b.onclick=fn;
actions.appendChild(b);
}

function roll(){return Math.floor(Math.random()*6)+1;}

function render(){
clear();

if(game.state==="CREATION"){
log("Choose your trait:");
btn("Strong (+5 ATK)",()=>{game.player.atk+=5;nextRoom();});
btn("Tough (+20 HP)",()=>{game.player.hp+=20;nextRoom();});
btn("Defensive (+5 DEF)",()=>{game.player.def+=5;nextRoom();});
}

else if(game.state==="PATH"){
log("Choose a door...");
btn("⬅ Left",enterRoom);
btn("⬆ Forward",enterRoom);
btn("➡ Right",enterRoom);
}

else if(game.state==="COMBAT"){
btn("Punch",()=>combatTurn("Punch"));
btn("Counter",()=>combatTurn("Counter"));
btn("Quick Attack",()=>combatTurn("Quick Attack"));
}

else if(game.state==="GAMEOVER"){
btn("Restart",reset);
}

else if(game.state==="WIN"){
btn("Play Again",reset);
}
}

function nextRoom(){
if(game.room >= game.maxRooms){
startBoss();
return;
}
game.room++;
game.state="PATH";
render();
updateUI();
}

function enterRoom(){
const r=roll();

if(r<=3){ // 50% enemy
log("[Room] Enemy!");
startCombat(false);
}
else if(r===4){
log("[Room] Empty.");
nextRoom();
}
else if(r===5){
log("[Room] Potion +15 HP");
game.player.hp+=15;
updateUI();
nextRoom();
}
else if(r===6){
loot();
nextRoom();
}
}

function startCombat(isBoss){
game.isBoss=isBoss;

game.enemy=isBoss?
{hp:100,atk:25,def:5}:
{hp:40,atk:10,def:3};

document.getElementById("enemySprite").src=isBoss?"boss.png":"enemy.png";

game.state="COMBAT";
log(isBoss?"🔥 BOSS FIGHT 🔥":"Battle starts!");
updateUI();
render();
}

function startBoss(){
log("⚠ FINAL BOSS ⚠");
startCombat(true);
}

function combatTurn(playerMove){
const moves=["Punch","Counter","Quick Attack"];
const enemyMove=moves[Math.floor(Math.random()*3)];

log(`You: ${playerMove} | Enemy: ${enemyMove}`);

let pMod=0.5,eMod=0.5,outcome="TIE";

if(
(playerMove==="Punch"&&enemyMove==="Counter")||
(playerMove==="Counter"&&enemyMove==="Quick Attack")||
(playerMove==="Quick Attack"&&enemyMove==="Punch")
){
pMod=1.0;eMod=0.25;outcome="WIN";
}
else if(
(enemyMove==="Punch"&&playerMove==="Counter")||
(enemyMove==="Counter"&&playerMove==="Quick Attack")||
(enemyMove==="Quick Attack"&&playerMove==="Punch")
){
pMod=0.5;eMod=1.0;outcome="LOSE";
}

log("Outcome: "+outcome);

let baseP=Math.max(1,game.player.atk-game.enemy.def+rand(-2,2));
let baseE=Math.max(1,game.enemy.atk-game.player.def+rand(-2,2));

let dmgP=Math.floor(baseP*pMod);
let dmgE=Math.floor(baseE*eMod);

game.enemy.hp-=dmgP;
log(`You deal ${dmgP}`);

if(game.enemy.hp<=0){
if(game.isBoss){
log("🏆 YOU WIN!");
game.state="WIN";
render();
return;
}
log("Enemy defeated!");
document.getElementById("enemySprite").src="";
nextRoom();
return;
}

game.player.hp-=dmgE;
log(`Enemy deals ${dmgE}`);

updateUI();

if(game.player.hp<=0){
log("GAME OVER");
game.state="GAMEOVER";
render();
}
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function loot(){
const items=["Sword","Shield","Elixir"];
const item=items[Math.floor(Math.random()*items.length)];

log("[Loot] "+item);

if(item==="Sword"){game.player.atk+=3;}
if(item==="Shield"){game.player.def+=2;}
if(item==="Elixir"){game.player.hp+=25;}

updateUI();
}

function reset(){
game.player={hp:100,atk:10,def:5};
game.room=0;
game.state="CREATION";
logDiv.innerHTML="";
document.getElementById("enemySprite").src="";
updateUI();
render();
}

updateUI();
render();
</script>

</body>
</html>
